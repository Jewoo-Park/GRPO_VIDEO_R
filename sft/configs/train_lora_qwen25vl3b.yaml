model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
train_files:
  - ./data/aqua_rat_multiple_choice.json
  - ./data/aqua_rat_open_form.json
output_dir: ./outputs/qwen25vl3b_lora_sft

max_length: 4096
val_size: 0.05
seed: 42

bf16: true
fp16: false

learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
num_train_epochs: 3.0

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8

logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 3
gradient_checkpointing: true

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Available formats: answer, cot, long_cot
# - CODE-style CoT is excluded when drop_code_cot=true.
reasoning_formats:
  - answer
  - cot
  - long_cot

# expand: create one sample per selected format if available
# single: keep only first available format from reasoning_formats order
format_mix_strategy: expand
append_format_instruction: true
drop_code_cot: true
